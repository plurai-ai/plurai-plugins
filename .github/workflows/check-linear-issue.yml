name: Check for Linear Issue Link

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  validate-linear-issue:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR for Linear issue reference
        run: |
          echo "🔍 Checking PR for Linear issue reference..."

          TITLE=$(jq -r .pull_request.title "$GITHUB_EVENT_PATH")
          BODY=$(jq -r .pull_request.body "$GITHUB_EVENT_PATH")

          # Check for Linear issue ID patterns in strict format (PLU-123: Title)
          LINEAR_ID_TITLE=$(echo "$TITLE" | grep -o '^[A-Z]\{2,\}-[0-9]\+:' | sed 's/:$//' | head -n1)
          LINEAR_ID_BODY=$(echo "$BODY" | grep -o '^[A-Z]\{2,\}-[0-9]\+:' | sed 's/:$//' | head -n1)

          # Check for Linear app URL format in body
          LINEAR_URL=$(echo "$BODY" | grep -o 'https://linear\.app/[^/]*/issue/[A-Z]\{2,\}-[0-9]\+' | head -n1)

          if [ -n "$LINEAR_ID_TITLE" ]; then
            echo "✅ Linear issue ID found in title: $LINEAR_ID_TITLE"
          elif [ -n "$LINEAR_ID_BODY" ]; then
            echo "✅ Linear issue ID found in body: $LINEAR_ID_BODY"
          elif [ -n "$LINEAR_URL" ]; then
            echo "✅ Linear issue URL found in body: $LINEAR_URL"
          else
            echo "❌ ERROR: No Linear issue reference found in PR title or description."
            echo "Please include a Linear issue ID in strict format (e.g., 'PLU-123: Your title') in the title, or a Linear issue URL in the body."
            exit 1
          fi
